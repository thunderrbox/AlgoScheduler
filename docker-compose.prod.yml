version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: algo_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-projectdb}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - app_net

  redis:
    image: redis:7
    container_name: algo_redis
    restart: always
    networks:
      - app_net

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: algo_api
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    depends_on:
      - postgres
      - redis
    networks:
      - app_net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: algo_worker
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      NODE_ENV: production
    depends_on:
      - postgres
      - redis
    networks:
      - app_net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: algo_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  postgres_prod_data:
